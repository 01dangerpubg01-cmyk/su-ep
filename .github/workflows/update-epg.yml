name: Refresh Sun NXT EPG

on:
  schedule:
    - cron: '30 18 * * *'   # Daily midnight IST (18:30 UTC)
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to fetch (1-14)'
        required: false
        default: '7'

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch EPG from Sun NXT API
        run: |
          DAYS=${{ github.event.inputs.days || '7' }}
          echo "Fetching $DAYS days of EPG..."
          python3 sunnxt_epg.py --days $DAYS --output sunnxt_epg.xml --gz

      - name: Show stats
        run: |
          ls -lh sunnxt_epg.xml sunnxt_epg.xml.gz
          echo "Programme count: $(grep -c '<programme' sunnxt_epg.xml)"
          echo "Channel count:   $(grep -c '<channel' sunnxt_epg.xml)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sunnxt_epg.xml sunnxt_epg.xml.gz
          git diff --staged --quiet || (
            git commit -m "chore: refresh EPG $(date +'%Y-%m-%d') ($DAYS days)"
            git push
          )
