name: Refresh Sun NXT EPG

on:
  schedule:
    - cron: '30 18 * * *'   # Daily midnight IST (18:30 UTC)
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate EPG XML
        run: python3 sunnxt_epg.py --output sunnxt_epg.xml --gz

      - name: Verify output
        run: |
          ls -lh sunnxt_epg.xml sunnxt_epg.xml.gz
          head -20 sunnxt_epg.xml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sunnxt_epg.xml sunnxt_epg.xml.gz
          git diff --staged --quiet || (
            git commit -m "chore: refresh EPG $(date +'%Y-%m-%d')"
            git push
          )
