name: Refresh Sun NXT EPG

on:
  schedule:
    - cron: '30 18 * * *'   # 18:30 UTC = midnight IST daily
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  generate-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate EPG XML (7 days)
        run: python3 sunnxt_epg.py --days 7 --output sunnxt_epg.xml

      - name: Verify output
        run: |
          echo "Generated EPG file:"
          ls -lh sunnxt_epg.xml
          echo "First 20 lines:"
          head -20 sunnxt_epg.xml

      - name: Commit and push updated EPG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sunnxt_epg.xml
          git diff --staged --quiet || (
            git commit -m "chore: auto-refresh EPG $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          )
          echo "EPG push complete."
